name: Run Ballot OCR Processing

on:
  workflow_dispatch: # Allows you to manually trigger this from the GitHub UI whenever you want

jobs:
  process-ballots:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Automatically caches your requirements so subsequent runs are fast

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run OCR Processing
        run: |
          export PYTHONPATH=src
          python3 process_files.py ./tests/testfiles/

      - name: Upload OCR Results
        uses: actions/upload-artifact@v4
        with:
          name: ocr-json-results
          path: |
            tests/testfiles/**/*.json
          retention-days: 7 # Kept for 7 days before auto-deleting

