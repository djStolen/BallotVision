name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    # This instructs GitHub to pull your devcontainer Dockerfile 
    # and run the job steps inside that environment
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    container:
      image: python:3.10-slim # Use the same base image as your devcontainer
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y \
            gcc \
            g++ \
            libgomp1 \
            libgl1 \
            libglib2.0-0 \
            libsm6 \
            libxext6 \
            libxrender-dev
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run tests
        run: |
          chmod +x run.sh
          ./run.sh test

